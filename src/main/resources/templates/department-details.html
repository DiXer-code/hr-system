<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Дашборд Відділу</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/style.css(v=2.0)}">
</head>
<body>

<div class="sidebar">
    <div class="sidebar-brand"><i class="bi bi-rocket-takeoff-fill me-2"></i> HR System</div>
    <ul class="nav flex-column">
        <li class="nav-item"><a href="/employees" class="nav-link"><i class="bi bi-people-fill"></i> Співробітники</a></li>
        <li class="nav-item"><a href="/departments" class="nav-link active"><i class="bi bi-building"></i> Відділи</a></li>
        <li class="nav-item mt-5"><a th:href="@{/logout}" class="nav-link text-danger"><i class="bi bi-box-arrow-left"></i> Вихід</a></li>
    </ul>
</div>

<div class="main-content">
    <div class="container-fluid animate-fade-up">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="d-flex align-items-center">
                <a href="/departments" class="btn btn-light rounded-circle me-3" style="width: 40px; height: 40px;"><i class="bi bi-arrow-left"></i></a>
                <div>
                    <h3 class="m-0 fw-bold" th:text="${department.id == null ? 'Створення підрозділу' : department.name}"></h3>
                    <span class="text-muted small">Управління налаштуваннями та командою</span>
                </div>
            </div>
        </div>

        <div class="row g-4">

            <div class="col-lg-7">
                <form th:action="@{/departments/save}" th:object="${department}" method="post">
                    <input type="hidden" th:field="*{id}">

                    <div class="card-custom p-4 border-top border-primary border-4 mb-4">
                        <h5 class="fw-bold mb-4"><i class="bi bi-gear-fill text-primary me-2"></i>Основна інформація</h5>

                        <div class="row g-4">
                            <div class="col-md-12">
                                <label class="form-label small fw-bold text-muted">Офіційна назва</label>
                                <input type="text" th:field="*{name}" class="form-control form-control-modern" placeholder="Введіть назву..." required>
                            </div>

                            <div class="col-md-12">
                                <label class="form-label small fw-bold text-muted">Опис діяльності / Функції</label>
                                <textarea th:field="*{description}" class="form-control form-control-modern" rows="5" placeholder="Чим саме займається цей відділ? Які його ключові завдання?"></textarea>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-muted">Локація (Офіс)</label>
                                <select class="form-select form-control-modern text-muted">
                                    <option>Головний офіс (Київ)</option>
                                    <option>Віддалено</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-muted">Статус фінансування</label>
                                <select class="form-select form-control-modern text-muted">
                                    <option>Затверджено</option>
                                    <option>Очікує перегляду</option>
                                </select>
                            </div>
                        </div>

                        <div class="mt-4 text-end">
                            <button type="submit" class="btn btn-primary-modern px-5">
                                <i class="bi bi-save me-2"></i>Зберегти зміни
                            </button>
                        </div>
                    </div>
                </form>
            </div>

            <div class="col-lg-5" th:if="${department.id != null}">
                <div class="card-custom p-4 h-100">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="fw-bold m-0"><i class="bi bi-people-fill text-primary me-2"></i>Команда</h5>
                        <span class="badge bg-primary rounded-pill" th:text="${#lists.size(deptEmployees)} + ' чол.'"></span>
                    </div>

                    <div th:if="${not #lists.isEmpty(deptEmployees)}" class="list-group list-group-flush border-0">
                        <div th:each="emp : ${deptEmployees}" class="list-group-item d-flex align-items-center px-0 py-3 border-bottom">

                            <div class="avatar-circle me-3" style="width: 40px; height: 40px; font-size: 1rem;">
                                <img th:if="${emp.avatar != null}" th:src="'data:image/jpeg;base64,' + ${emp.getAvatarBase64()}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;">
                                <span th:if="${emp.avatar == null}" th:text="${emp.firstName != null && emp.firstName.length() > 0 ? emp.firstName.substring(0,1) : 'U'}"></span>
                            </div>

                            <div class="flex-grow-1">
                                <a th:href="@{/employees/edit/{id}(id=${emp.id})}" class="text-dark fw-bold text-decoration-none d-block">
                                    <span th:text="${emp.lastName + ' ' + emp.firstName}"></span>
                                </a>
                                <small class="text-muted" th:text="${emp.position != null ? emp.position.name : 'Посада не вказана'}"></small>
                            </div>

                            <div>
                                <span class="badge"
                                      th:classappend="${emp.status == 'Активний' ? 'bg-success-subtle text-success' : 'bg-warning-subtle text-warning'}"
                                      th:text="${emp.status}">
                                </span>
                            </div>
                        </div>
                    </div>

                    <div th:if="${#lists.isEmpty(deptEmployees)}" class="text-center py-5">
                        <i class="bi bi-person-x text-muted" style="font-size: 3rem;"></i>
                        <p class="text-muted mt-2 mb-0">У цьому відділі поки немає співробітників.</p>
                        <a href="/employees/new" class="btn btn-sm btn-outline-primary mt-3">Додати працівника</a>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
