<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Додати працівника</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto; }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { background-color: #4CAF50; color: white; padding: 10px 20px; border: none; cursor: pointer; width: 100%; }
        button:hover { background-color: #45a049; }
        h2 { text-align: center; }
    </style>
</head>
<body>

<h2>📝 Новий працівник</h2>

<form action="#" th:action="@{/employees/save}" th:object="${employee}" method="POST">

    <label>Ім'я:</label>
    <input type="text" th:field="*{firstName}" placeholder="Введіть ім'я" required>

    <label>Прізвище:</label>
    <input type="text" th:field="*{lastName}" placeholder="Введіть прізвище" required>

    <label>Email:</label>
    <input type="email" th:field="*{email}" placeholder="example@mail.com">

    <label>Контакти:</label>
    <input type="text" th:field="*{contactInfo}" placeholder="+380...">

    <button type="submit">Зберегти в базу ✅</button>
</form>

<br>
<a href="/employees">🔙 Назад до списку</a>

</body>
</html>
