<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Відділи - HR System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<div class="sidebar">
    <div class="sidebar-brand">
        <i class="bi bi-rocket-takeoff-fill me-2"></i> HR System
    </div>
    <ul class="nav flex-column">
        <li class="nav-item">
            <a href="/employees" class="nav-link">
                <i class="bi bi-people-fill"></i> Співробітники
            </a>
        </li>
        <li class="nav-item">
            <a href="/departments" class="nav-link active">
                <i class="bi bi-building"></i> Відділи
            </a>
        </li>
        <li class="nav-item mt-5">
            <a th:href="@{/logout}" class="nav-link text-danger">
                <i class="bi bi-box-arrow-left"></i> Вихід
            </a>
        </li>
    </ul>
</div>

<div class="main-content">
    <div class="container-fluid animate-fade-up">

        <div class="top-bar mb-4">
            <div>
                <h2 class="fw-bold text-dark mb-1">Департаменти</h2>
                <p class="text-muted mb-0">Структурні підрозділи компанії</p>
            </div>
            <div class="top-actions">
                <a href="/departments/new" class="btn btn-primary-modern">
                    <i class="bi bi-plus-lg me-2"></i>Додати відділ
                </a>
            </div>
        </div>

        <div class="card-custom p-4 animate-fade-up animate-delay-1">
            <div class="table-responsive">
                <table class="table-modern">
                    <thead>
                    <tr>
                        <th>Назва відділу</th>
                        <th>Опис / Спеціалізація</th>
                        <th class="text-end">Дії</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="dept : ${departments}">
                        <td>
                            <div class="d-flex align-items-center">
                                <div class="avatar-circle me-3 bg-light text-primary border" style="width: 45px; height: 45px;">
                                    <i class="bi bi-building"></i>
                                </div>
                                <div>
                                    <a th:href="@{/departments/edit/{id}(id=${dept.id})}" class="text-decoration-none text-dark fw-bold">
                                        <span th:text="${dept.name}"></span>
                                    </a>
                                </div>
                            </div>
                        </td>
                        <td class="text-muted" th:text="${dept.description != null ? dept.description : 'Опис відсутній'}"></td>

                        <td class="text-end">
                            <a th:href="@{/departments/edit/{id}(id=${dept.id})}" class="btn btn-sm btn-light text-primary me-1">
                                <i class="bi bi-pencil-fill"></i>
                            </a>
                            <a th:href="@{/departments/delete/{id}(id=${dept.id})}" class="btn btn-sm btn-light text-danger" onclick="return confirm('Точно видалити цей відділ?')">
                                <i class="bi bi-trash3-fill"></i>
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div th:if="${departments.empty}" class="text-center py-5">
                <i class="bi bi-building-dash fs-1 text-muted"></i>
                <p class="text-muted mt-3 mb-1">Відділів ще немає</p>
            </div>
        </div>
    </div>
</div>

</body>
</html>
