<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Відділи компанії</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/style.css(v=2.0)}">
    <style>
        .dept-card {
            border-top: 4px solid var(--primary-color);
            transition: all 0.3s ease;
        }
        .dept-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(79, 70, 229, 0.1);
        }
        .dept-icon-wrapper {
            width: 60px; height: 60px;
            border-radius: 15px;
            background: linear-gradient(135deg, #eef2ff 0%, #e0e7ff 100%);
            color: var(--primary-color);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-brand"><i class="bi bi-rocket-takeoff-fill me-2"></i> HR System</div>
    <ul class="nav flex-column">
        <li class="nav-item"><a href="/employees" class="nav-link"><i class="bi bi-people-fill"></i> Співробітники</a></li>
        <li class="nav-item"><a href="/departments" class="nav-link active"><i class="bi bi-building"></i> Відділи</a></li>
        <li class="nav-item mt-5"><a th:href="@{/logout}" class="nav-link text-danger"><i class="bi bi-box-arrow-left"></i> Вихід</a></li>
    </ul>
</div>

<div class="main-content">
    <div class="container-fluid animate-fade-up">

        <div class="top-bar mb-5">
            <div>
                <h2 class="fw-bold text-dark mb-1">Департаменти</h2>
                <p class="text-muted mb-0">Структура та підрозділи вашої компанії</p>
            </div>
            <div class="top-actions">
                <a href="/departments/new" class="btn btn-primary-modern shadow">
                    <i class="bi bi-plus-lg me-2"></i>Створити відділ
                </a>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-xl-4 col-lg-6 col-md-6" th:each="dept : ${departments}">
                <div class="card-custom h-100 p-4 dept-card position-relative">

                    <div class="position-absolute top-0 end-0 p-3">
                        <a th:href="@{/departments/edit/{id}(id=${dept.id})}" class="btn btn-sm btn-light text-primary me-1 rounded-circle" style="width: 32px; height: 32px; padding: 4px;"><i class="bi bi-pencil"></i></a>
                        <a th:href="@{/departments/delete/{id}(id=${dept.id})}" class="btn btn-sm btn-light text-danger rounded-circle" style="width: 32px; height: 32px; padding: 4px;" onclick="return confirm('Видалити?')"><i class="bi bi-trash3"></i></a>
                    </div>

                    <div class="dept-icon-wrapper">
                        <i class="bi bi-layers-half"></i>
                    </div>

                    <h4 class="fw-bold text-dark mb-2" th:text="${dept.name}"></h4>
                    <p class="text-muted small mb-4" style="min-height: 40px;" th:text="${dept.description != null ? dept.description : 'Опис напрямку діяльності відсутній...'}"></p>

                    <hr class="text-muted opacity-25">

                    <div class="d-flex justify-content-between align-items-center mt-3">
                        <div>
                            <span class="badge bg-success-subtle text-success px-3 py-2 rounded-pill"><i class="bi bi-check-circle me-1"></i> Активний</span>
                        </div>
                        <a th:href="@{/departments/edit/{id}(id=${dept.id})}" class="text-primary text-decoration-none small fw-bold">
                            Управління <i class="bi bi-arrow-right ms-1"></i>
                        </a>
                    </div>
                </div>
            </div>

            <div th:if="${departments.empty}" class="col-12 text-center py-5">
                <i class="bi bi-building-dash fs-1 text-muted"></i>
                <h4 class="mt-3">Жодного відділу не знайдено</h4>
                <p class="text-muted">Створіть свій перший підрозділ, щоб почати структурувати команду.</p>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
