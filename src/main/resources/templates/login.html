<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вхід - HR System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/style.css(v=2.0)}">
    <style>
        body {
            display: flex; align-items: center; justify-content: center;
            height: 100vh; background-color: var(--bg-color);
            margin: 0; padding: 0;
        }
        .login-card {
            max-width: 400px; width: 100%; text-align: center;
        }
        /* Прибираємо сайдбар зі сторінки логіну */
        .sidebar { display: none; }
        .main-content { margin-left: 0; padding: 0; }
    </style>
</head>
<body>

<div class="card-custom p-5 login-card animate-fade-up shadow-lg">
    <div class="mb-4 text-primary" style="font-size: 3.5rem;">
        <i class="bi bi-rocket-takeoff-fill"></i>
    </div>
    <h3 class="fw-bold mb-1 text-dark">HR System</h3>
    <p class="text-muted mb-4 small">Увійдіть до системи управління</p>

    <div th:if="${error}" class="alert alert-danger py-2 small animate-fade-up" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
    </div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3 text-start">
            <label class="form-label small fw-bold text-muted">Логін</label>
            <input type="text" name="username" class="form-control form-control-modern" placeholder="admin" required autofocus>
        </div>
        <div class="mb-4 text-start">
            <label class="form-label small fw-bold text-muted">Пароль</label>
            <input type="password" name="password" class="form-control form-control-modern" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary-modern w-100 py-2">
            <i class="bi bi-box-arrow-in-right me-2"></i>Увійти
        </button>
    </form>
</div>

</body>
</html>
